# jk e2e harness — Docker Compose definition.
#
# Brings up a single Jenkins LTS instance pre-seeded via JCasC so the e2e
# test suite has a known URL, admin user, API token, and a small set of
# pipelines to query. Usage:
#
#   make e2e-up          # build image + start container + wait for ready
#   make test-e2e        # run go tests with -tags=e2e
#   make e2e-down        # stop and remove the container + volume
#
# The Jenkins port is mapped to host 18080 (not 8080) to avoid colliding
# with whatever else the developer is already running. The JNLP agent
# port is not exposed; we run agentless.
#
# An nginx proxy is included for two e2e scenarios:
#   * a TLS endpoint on host port 18443 (forwards to Jenkins on the
#     internal Docker network) for the SSL_CERT_FILE test; the
#     self-signed cert lives at test/e2e/nginx/server.crt.
#   * a context-path mount on host port 18081 that exposes the same
#     Jenkins under a /jenkins/ prefix, so the e2e suite can drive `jk`
#     against an instance served beneath a context path.
#
# Volumes:
#   jenkins_home  - persists across `docker compose up` cycles so plugin
#                   downloads are reused. Deleted by `make e2e-down`.
#   The jcasc/ and pipelines/ directories are ALSO bind-mounted on top of
#   the baked-in copy so editing the YAML or a Jenkinsfile is immediately
#   visible inside the container (after a JCasC reload or job rebuild).
services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: jk-e2e-jenkins:local
    container_name: jk-e2e-jenkins
    ports:
      - "18080:8080"
    environment:
      JK_E2E_ADMIN_USER: "${JK_E2E_ADMIN_USER:-admin}"
      JK_E2E_ADMIN_PASS: "${JK_E2E_ADMIN_PASS:-admin-password}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/jcasc:/var/jenkins_home/casc_configs:ro
      - ./jenkins/pipelines:/var/jenkins_home/pipelines:ro
    healthcheck:
      # Jenkins exposes /login on port 8080 once it has finished boot. We
      # poll that rather than /api/json so the check doesn't depend on
      # auth being fully initialized. The 30s start_period gives JCasC
      # time to apply on first boot (cold image: ~20s on Apple Silicon).
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 30

  nginx:
    image: nginx:alpine
    container_name: jk-e2e-nginx
    ports:
      - "18443:8443"
      - "18081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/server.crt:/etc/nginx/certs/server.crt:ro
      - ./nginx/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      jenkins:
        condition: service_healthy

volumes:
  jenkins_home:
    name: jk-e2e-jenkins-home
