server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location / {
        proxy_pass         http://jenkins:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}

# Context-path mount: exposes the same root Jenkins under a /jenkins/
# prefix so the e2e suite can prove `jk` handles instances served beneath
# a context path (the parse-context-path-prefix change). The trailing
# slash on proxy_pass strips the matched /jenkins/ prefix, so a request
# for /jenkins/job/hello/1/api/json is forwarded to Jenkins as
# /job/hello/1/api/json. From jk's perspective Jenkins is genuinely
# mounted at /jenkins: if jk drops the prefix on the outgoing request,
# nginx returns 404 and the test fails.
server {
    listen 8081;
    server_name localhost;

    location /jenkins/ {
        proxy_pass         http://jenkins:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
    }
}
